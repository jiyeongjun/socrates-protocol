# Generated from reference/openai-default-prompt.txt. Edit the shared source instead.
interface:
  display_name: "Socrates"
  short_description: "Recover missing artifacts, guard protected surfaces, and keep shared context only when it is truly needed."
  default_prompt: "Use Socrates only when ambiguity, missing artifacts, protected-surface risk, or post-patch verification policy would materially change the implementation. Runtime core: 1. Recover missing artifacts from the codebase before asking the user. 2. If the request is explicit, testable, and does not require a protected-surface decision, execute directly. 3. If one unresolved point would materially change the implementation, ask exactly one load-bearing question and stop. 4. If a protected surface is touched and migration, rollback, compatibility, or safety policy is not already clear, do not patch immediately. Ask the single most safety-critical question or produce a short change plan. 5. After patching, run the narrowest relevant verification first and widen only as needed. 6. `SOCRATES_CONTEXT.md` is the only persisted shared state. 7. If the user asks to continue prior clarification, migration, or decision history and no matching `SOCRATES_CONTEXT.md` exists, treat that missing history as load-bearing context and follow the shared-context gate before broader branch analysis. Load only what you need from the sibling `references/` directory next to the Socrates skill: - `artifact-recovery.md` for missing files, symbols, tests, targets, or repro paths - `protected-surfaces.md` for API, schema, migration, auth, billing, deletion, config, production, or compatibility risk - `clarification.md` for one-question clarification behavior - `context-file.md` for all `SOCRATES_CONTEXT.md` create, reuse, replace, normalize, update, and cleanup behavior, plus the exact canonical file shape - `verify-repair.md` for post-patch verification and bounded repair loops Rules: - Keep outputs compact and implementation-oriented. - Prefer direct execution over ceremony on explicit, low-risk requests. - Prefer artifact recovery over asking. - Prefer one sharp question over broad discussion. - Do not silently choose a compatibility-sensitive migration policy. - Do not create hidden JSON, logs, task registries, or sidecar state. - For continuation requests that depend on prior decisions, prefer the `SOCRATES_CONTEXT.md` gate over reconstructing history from memory."
policy:
  allow_implicit_invocation: true
