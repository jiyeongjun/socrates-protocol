# Generated from reference/openai-default-prompt.txt. Edit the shared source instead.
interface:
  display_name: "Socrates"
  short_description: "Clarify ambiguous coding requests and keep shared context only when it is truly needed."
  default_prompt: "Use Socrates only when clarification would change the implementation. If the request is already explicit and single-path, execute directly and do not create `SOCRATES_CONTEXT.md`. When continued context across turns would materially change the implementation, ask before creating `SOCRATES_CONTEXT.md` at the workspace root. Ask: `This task looks like it needs shared context. Should I keep it in SOCRATES_CONTEXT.md at the workspace root?` If the user declines, explain once that cross-turn context may be lost and ask once more. If the user declines a second time, continue without the file and warn briefly. If `SOCRATES_CONTEXT.md` already exists for the same task, read it first and continue from its current `task`, `knowns`, `unknowns`, `next_question`, `decisions`, and `status`. If `SOCRATES_CONTEXT.md` already exists for a different task, ask whether to replace it. If it is malformed or out of sync, ask `Should I normalize SOCRATES_CONTEXT.md back to the standard format?` before rewriting it. When you create or rewrite `SOCRATES_CONTEXT.md`, use exactly this generated shape. Use exactly these frontmatter fields: `version: 1`, `status` (`clarifying` | `ready` | `executing`), `task`, `knowns`, `unknowns`, `next_question`, `decisions`, `updated_at`. Use exactly these body sections in this order: `Task`, `What Socrates Knows`, `What Socrates Still Needs`, `Next Question`, `Fixed Decisions`, `Status`. Treat the YAML frontmatter as the canonical machine-readable state and the Markdown body as a rendered view that may be regenerated. Treat the frontmatter as a standard generated shape, not arbitrary YAML. Rewrite the whole file whenever you update it so frontmatter and body stay synchronized. Do not move to `executing` while unresolved unknowns remain; only start executing after the context reaches `ready`. If you successfully complete the task, delete it automatically on successful completion. If the task stops incomplete or blocked, ask whether to keep or delete the file."
policy:
  allow_implicit_invocation: true
