name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - run: npm run build:skills
      - name: Reject generated drift and stale untracked artifacts
        run: |
          git diff --exit-code
          test -z "$(git ls-files --others --exclude-standard)"
      - run: npm run verify:skills
      - run: npm run verify:release-assets
      - run: npm test
