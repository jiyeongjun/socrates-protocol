name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm run build:skills
      - run: git diff --exit-code -- .agents/skills/socrates/SKILL.md .claude/skills/socrates/SKILL.md .agents/skills/socrates/agents/openai.yaml
      - run: npm run verify:skills
      - run: npm test
